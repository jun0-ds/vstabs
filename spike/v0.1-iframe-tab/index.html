<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>vstabs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; height: 100vh;
    font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
    background: #1e1e1e;
  }
  #tabbar {
    display: flex; height: 44px; background: #252526; color: #cccccc;
    align-items: stretch; border-bottom: 1px solid #1e1e1e;
    flex-shrink: 0; user-select: none;
  }
  #tabbar .tab {
    background: transparent; border: none; color: inherit;
    padding: 0 18px; cursor: pointer; font-size: 13px;
    border-right: 1px solid #1e1e1e;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.05s;
    position: relative;
  }
  #tabbar .tab:hover { background: #2a2d2e; }
  #tabbar .tab.active {
    background: #1e1e1e; color: #ffffff;
  }
  #tabbar .tab.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: var(--env-color, #007acc);
  }
  #tabbar .tab .icon { font-size: 16px; }
  #tabbar .tab .name { font-weight: 500; }
  #tabbar .tab .env-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    background: var(--env-color, #555); color: #1e1e1e;
    font-weight: 600; letter-spacing: 0.5px;
  }
  #tabbar .add {
    background: transparent; border: none; color: #888; cursor: pointer;
    padding: 0 14px; font-size: 18px;
    border-right: 1px solid #1e1e1e;
  }
  #tabbar .add:hover { background: #2a2d2e; color: #ccc; }
  #tabbar .spacer { flex: 1; }
  #tabbar .meta {
    display: flex; align-items: center; padding: 0 14px;
    color: #666; font-size: 11px; gap: 14px;
  }
  #content { flex: 1; position: relative; background: #1e1e1e; }
  iframe {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; display: none;
  }
  iframe.active { display: block; }
  #empty-state {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    color: #888; font-size: 14px;
  }
  #empty-state.show { display: flex; }
</style>
<script src="projects.js"></script>
</head>
<body>
<nav id="tabbar"></nav>
<main id="content">
  <div id="empty-state">No project selected</div>
</main>
<script>
  const tabbar = document.getElementById('tabbar');
  const content = document.getElementById('content');

  // ---- Build tabs and iframes from PROJECTS registry ------------------------
  const tabEls = {};
  const iframeEls = {};
  let activeId = null;
  let switchCount = 0;
  let lastSwitchMs = 0;

  function envColor(env) {
    return (typeof ENV_COLORS !== 'undefined' && ENV_COLORS[env]) || '#888';
  }

  function buildFaviconDataUrl(emoji) {
    const svg =
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">` +
      `<text x="50" y="55" text-anchor="middle" dominant-baseline="middle" font-size="80">${emoji}</text>` +
      `</svg>`;
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  }

  function setFavicon(emoji) {
    let link = document.querySelector("link[rel~='icon']");
    if (!link) {
      link = document.createElement('link');
      link.rel = 'icon';
      document.head.appendChild(link);
    }
    link.type = 'image/svg+xml';
    link.href = buildFaviconDataUrl(emoji);
  }

  function activate(id) {
    if (!id || !tabEls[id]) return;
    const t0 = performance.now();
    Object.entries(tabEls).forEach(([k, el]) => el.classList.toggle('active', k === id));
    Object.entries(iframeEls).forEach(([k, el]) => el.classList.toggle('active', k === id));
    activeId = id;
    const proj = PROJECTS.find(p => p.id === id);
    if (proj) {
      // Browser tab title — this is what shows in OS taskbar / Chrome tab bar
      document.title = `${proj.icon} ${proj.name} — vstabs`;
      setFavicon(proj.icon);
    }
    const t1 = performance.now();
    switchCount++;
    lastSwitchMs = t1 - t0;
    renderMeta();
  }

  function renderMeta() {
    const meta = tabbar.querySelector('.meta');
    if (!meta) return;
    const total = PROJECTS.length;
    meta.innerHTML =
      `<span>${total} project${total === 1 ? '' : 's'}</span>` +
      `<span>switch #${switchCount} ${lastSwitchMs.toFixed(1)}ms</span>`;
  }

  function buildTabbar() {
    PROJECTS.forEach(proj => {
      const tab = document.createElement('button');
      tab.className = 'tab';
      tab.style.setProperty('--env-color', envColor(proj.env));
      tab.dataset.id = proj.id;
      tab.innerHTML =
        `<span class="icon">${proj.icon}</span>` +
        `<span class="name">${proj.name}</span>` +
        `<span class="env-tag">${proj.env.toUpperCase()}</span>`;
      tab.addEventListener('click', () => activate(proj.id));
      tabbar.appendChild(tab);
      tabEls[proj.id] = tab;

      const iframe = document.createElement('iframe');
      iframe.dataset.id = proj.id;
      iframe.src = `http://127.0.0.1:${proj.port}/?folder=${encodeURIComponent(proj.folder)}`;
      content.appendChild(iframe);
      iframeEls[proj.id] = iframe;
    });

    // "+" button (placeholder for v0.1 add-project UI)
    const addBtn = document.createElement('button');
    addBtn.className = 'add';
    addBtn.title = 'Add project';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', () => {
      alert(
        'Add-project UI is v0.1 work.\n\n' +
        'For the spike, edit projects.js and reload (Ctrl+R).\n\n' +
        'Production model: form to enter name + env + folder + port,\n' +
        'then writes to %APPDATA%\\vstabs\\projects.json and lazy-spawns code-server.'
      );
    });
    tabbar.appendChild(addBtn);

    const spacer = document.createElement('div');
    spacer.className = 'spacer';
    tabbar.appendChild(spacer);

    const meta = document.createElement('div');
    meta.className = 'meta';
    tabbar.appendChild(meta);
  }

  // ---- Hotkeys --------------------------------------------------------------
  // Ctrl+Alt+1..9 — direct project select (Tab inside VS Code is too hot to claim)
  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.altKey && /^Digit[1-9]$/.test(e.code)) {
      const n = parseInt(e.code.slice(-1), 10);
      const proj = PROJECTS[n - 1];
      if (proj) {
        activate(proj.id);
        e.preventDefault();
      }
    }
  });

  // ---- Boot -----------------------------------------------------------------
  if (typeof PROJECTS === 'undefined' || PROJECTS.length === 0) {
    document.getElementById('empty-state').classList.add('show');
    document.title = 'vstabs (no projects)';
  } else {
    buildTabbar();
    activate(PROJECTS[0].id);
  }
</script>
</body>
</html>
